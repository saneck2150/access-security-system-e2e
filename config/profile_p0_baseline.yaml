# P0 — Baseline AEAD Profile
# Weak configuration for experimental comparison.
# All security hardening mechanisms are disabled.

frame_handler:
  anti_replay_enabled: false          # No replay protection
  replay_window_size: 256
  max_ct_len: 4096
  max_skew_ms: 0                      # No timestamp validation
  allow_previous_key_version: false   # No key rotation support
  enforce_reader_door_binding: false  # No reader-door binding check

experiment:
  cipher_mode: "xchacha20"            # XChaCha20-Poly1305 (same cipher as P2, no hardening)
  key_derivation_mode: "direct"       # Master key used directly (no per-reader HKDF)
  aad_mode: "none"                    # No AAD binding in AEAD
  pepper_mode: "static"               # Fixed pepper (no versioning)
  audit_chain_enabled: false          # Plain log, no HMAC chain

key_management:
  current_key_version: 1
  allow_previous_key_version: false
  master_key_path: "secrets/master_key.hex"

storage:
  sqlite_path: "data/access_p0.db"

admin:
  bind_host: "0.0.0.0"
  port: 8080
  admin_token: "admin"
  hw_shared_secret_hex: "a7aa5de55ad5ccd6b9d155ded41751cb06276819e8188c062e64350b5966fae3"
  max_upload_bytes: 20000000
  max_events: 1024
