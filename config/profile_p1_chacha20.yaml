# P1 — Hardened ChaCha20-Poly1305 Profile
# Full security hardening with standard 96-bit nonce IETF ChaCha20.
# Identical to P2 except cipher_mode: "chacha20" (96-bit nonce vs 192-bit).

frame_handler:
  anti_replay_enabled: true           # Sliding window replay protection
  replay_window_size: 256
  max_ct_len: 4096
  max_skew_ms: 120000                 # 2-minute timestamp validation
  allow_previous_key_version: true    # Grace period during key rotation
  enforce_reader_door_binding: true   # Reader-door binding enforced

experiment:
  cipher_mode: "chacha20"             # ChaCha20-Poly1305 IETF (96-bit nonce)
  key_derivation_mode: "hkdf"         # Per-reader HKDF key derivation
  aad_mode: "full"                    # Full header as AAD (context binding)
  pepper_mode: "versioned"            # Versioned HKDF pepper (rotation support)
  audit_chain_enabled: true           # HMAC-chained tamper-evident audit log

key_management:
  current_key_version: 1
  allow_previous_key_version: true
  master_key_path: "secrets/master_key.hex"

storage:
  sqlite_path: "data/access_p1.db"

admin:
  bind_host: "0.0.0.0"
  port: 8080
  admin_token: "admin"
  hw_shared_secret_hex: "a7aa5de55ad5ccd6b9d155ded41751cb06276819e8188c062e64350b5966fae3"
  max_upload_bytes: 20000000
  max_events: 1024
